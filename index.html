<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesture Dashboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      overflow-y: auto;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 24px 0 32px;
    }

    /* ── Bento Grid ───────────────────────────────────────────────────────── */
    .bento {
      display: grid;
      grid-template-columns: 268px 1fr 188px;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      width: min(960px, calc(100vw - 32px));
      height: min(572px, calc(100vh - 32px));
    }

    .card {
      background: #131313;
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 18px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .card-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: rgba(255,255,255,0.22);
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    /* ── Pomodoro ─────────────────────────────────────────────────────────── */
    #pomodoro-card {
      grid-column: 1;
      grid-row: 1 / 3;
    }

    #timer-display {
      font-size: 84px;
      font-weight: 100;
      color: #efefef;
      font-variant-numeric: tabular-nums;
      letter-spacing: -4px;
      line-height: 1;
      transition: color 0.4s;
    }

    #timer-display.running {
      color: #5cffa8;
    }

    #timer-status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
    }

    #timer-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    #timer-dot.running {
      background: #5cffa8;
      box-shadow: 0 0 8px rgba(92,255,168,0.7);
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    #timer-status {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.38);
    }

    #timer-controls {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .timer-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.55);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
      position: relative;
      z-index: 1;
    }

    .timer-btn.hovered {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.9);
    }

    .timer-btn:active {
      transform: scale(0.91);
      background: rgba(255,255,255,0.04);
    }

    .timer-btn-label {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      text-align: center;
      margin-top: 5px;
      letter-spacing: 0.06em;
    }

    #timer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 18px;
    }

    .timer-action-btn {
      height: 42px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, border-color 0.15s, color 0.15s, opacity 0.15s;
    }

    #btn-start {
      background: rgba(92,255,168,0.12);
      border: 1.5px solid rgba(92,255,168,0.28);
      color: #5cffa8;
    }

    #btn-start:not(:disabled):hover {
      background: rgba(92,255,168,0.2);
      border-color: rgba(92,255,168,0.5);
    }

    #btn-start:disabled {
      opacity: 0.25;
      cursor: default;
    }

    #btn-stop {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.38);
    }

    #btn-stop:not(:disabled):hover {
      background: rgba(255,80,80,0.1);
      border-color: rgba(255,100,100,0.3);
      color: rgba(255,140,140,0.9);
    }

    #btn-stop:disabled {
      opacity: 0.2;
      cursor: default;
    }

    #timer-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .hint-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.22);
    }

    .hint-glyph {
      font-size: 13px;
      line-height: 1;
      width: 18px;
      text-align: center;
    }

    /* ── Calendar ─────────────────────────────────────────────────────────── */
    #calendar-card {
      grid-column: 2;
      grid-row: 1 / 3;
      padding: 26px 28px;
    }

    #cal-month-title {
      font-size: 22px;
      font-weight: 600;
      color: #efefef;
      letter-spacing: -0.3px;
    }

    #calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      flex: 1;
      margin-top: 4px;
    }

    .cal-header {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.22);
      text-align: center;
      padding: 5px 0 8px;
      letter-spacing: 0.06em;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      border-radius: 9px;
      cursor: pointer;
      background: transparent;
      border: none;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }

    .cal-day.hovered {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
    }

    .cal-day:active {
      background: rgba(255,255,255,0.12);
    }

    .cal-day.today {
      background: rgba(92,255,168,0.12);
      color: #5cffa8;
      font-weight: 700;
    }

    .cal-day.today.hovered {
      background: rgba(92,255,168,0.2);
    }

    .cal-day.empty {
      pointer-events: none;
    }

    /* ── Weather ──────────────────────────────────────────────────────────── */
    #weather-card {
      grid-column: 3;
      grid-row: 1;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 0;
      padding: 20px;
    }

    #weather-card .card-label {
      position: absolute;
      top: 20px;
      left: 20px;
      margin-bottom: 0;
    }

    #weather-icon {
      font-size: 44px;
      line-height: 1;
      margin-bottom: 10px;
      filter: saturate(0.4) opacity(0.65);
    }

    #weather-text {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      margin-bottom: 4px;
    }

    #weather-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      line-height: 1.6;
    }

    /* ── Gesture Card ─────────────────────────────────────────────────────── */
    #gesture-card {
      grid-column: 3;
      grid-row: 2;
      padding: 20px;
      gap: 0;
    }

    #gesture-name {
      font-size: 17px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      letter-spacing: -0.2px;
      margin-top: 2px;
      text-transform: capitalize;
      transition: color 0.25s;
      line-height: 1.2;
    }

    #gesture-name.active {
      color: #5cffa8;
    }

    #gesture-action {
      font-size: 10px;
      color: rgba(255,255,255,0.22);
      margin-top: 5px;
      line-height: 1.4;
    }

    #finger-pips {
      display: flex;
      gap: 7px;
      margin-top: auto;
      align-items: flex-end;
    }

    .finger-pip-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .finger-pip {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.14);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .finger-pip.extended {
      background: #5cffa8;
      border-color: #5cffa8;
      box-shadow: 0 0 6px rgba(92,255,168,0.55);
    }

    .finger-pip-label {
      font-size: 8px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    /* ── PiP Webcam ───────────────────────────────────────────────────────── */
    #pip-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 300px;
      height: 224px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 12px 48px rgba(0,0,0,0.6);
      z-index: 100;
      background: #080808;
    }

    #webcam {
      width: 300px;
      height: 224px;
      object-fit: cover;
      transform: scaleX(-1);
      display: block;
      opacity: 0.92;
    }

    #skeleton-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 224px;
    }

    #pip-badge {
      position: absolute;
      bottom: 9px;
      left: 11px;
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Cursor Overlay ───────────────────────────────────────────────────── */
    #cursor-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 600;
    }

    /* ── Init HUD (camera status only) ───────────────────────────────────── */
    #init-hud {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(13,13,13,0.85);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      z-index: 300;
      backdrop-filter: blur(14px);
      letter-spacing: 0.03em;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #init-hud.hidden {
      opacity: 0;
    }

    /* ── Calendar Modal ───────────────────────────────────────────────────── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    #modal-overlay.visible {
      display: flex;
    }

    #modal {
      background: #191919;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 36px;
      min-width: 300px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }

    #modal-date-display {
      font-size: 30px;
      font-weight: 300;
      color: #efefef;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    #modal-day-name {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      font-weight: 500;
      margin-bottom: 24px;
    }

    #modal-content {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      line-height: 1.7;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 22px;
    }

    #modal-close {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 11px 22px;
      cursor: pointer;
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
      letter-spacing: 0.02em;
    }

    #modal-close.hovered,
    #modal-close:hover {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.9);
    }

    /* ── Carousel ─────────────────────────────────────────────────────────── */
    #carousel-section {
      width: min(960px, calc(100vw - 32px));
      flex-shrink: 0;
    }

    #carousel-viewport {
      position: relative;
      height: 190px;
      perspective: 900px;
      overflow: hidden;
    }

    #carousel-track {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .carousel-slide {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 360px;
      height: 160px;
      margin-top: -80px;
      margin-left: -180px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.09);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.48s cubic-bezier(0.4,0,0.2,1),
                  opacity  0.48s cubic-bezier(0.4,0,0.2,1);
      will-change: transform, opacity;
    }

    .carousel-slide[data-center="true"] {
      box-shadow: 0 16px 56px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.12);
    }

    .slide-icon {
      font-size: 38px;
      line-height: 1;
      filter: saturate(0.55) opacity(0.8);
    }

    .slide-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    #carousel-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-top: 14px;
    }

    .carousel-arrow {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.11);
      color: rgba(255,255,255,0.45);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      line-height: 1;
      transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.1s;
    }

    .carousel-arrow:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.88);
    }

    .carousel-arrow:active { transform: scale(0.91); }

    .carousel-arrow.hovered {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.88);
    }

    #carousel-bar {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .carousel-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.16);
      cursor: pointer;
      transition: background 0.25s, transform 0.25s;
    }

    .carousel-dot.active {
      background: #5cffa8;
      transform: scale(1.45);
    }

    #carousel-gesture-hint {
      text-align: center;
      margin-top: 9px;
      font-size: 10px;
      color: rgba(255,255,255,0.16);
      letter-spacing: 0.07em;
    }
  </style>
</head>
<body>

  <!-- ── Bento Grid ─────────────────────────────────────────────────────── -->
  <div class="bento">

    <!-- Pomodoro -->
    <div class="card" id="pomodoro-card">
      <div class="card-label">Pomodoro</div>
      <div id="timer-display">05:00</div>
      <div id="timer-status-row">
        <div id="timer-dot"></div>
        <div id="timer-status">Ready</div>
      </div>
      <div id="timer-actions">
        <button class="timer-action-btn" id="btn-start">Start</button>
        <button class="timer-action-btn" id="btn-stop" disabled>Stop</button>
      </div>
      <div id="timer-controls">
        <div>
          <button class="timer-btn" id="btn-minus">−</button>
          <div class="timer-btn-label">–1 min</div>
        </div>
        <div>
          <button class="timer-btn" id="btn-plus">+</button>
          <div class="timer-btn-label">+1 min</div>
        </div>
      </div>
      <div id="timer-footer">
        <div class="hint-row">
          <span class="hint-glyph">✊</span>
          <span>Fist — reset</span>
        </div>
        <div class="hint-row">
          <span class="hint-glyph">☝️</span>
          <span>Point + dwell — ±1.5 min</span>
        </div>
      </div>
    </div>

    <!-- Calendar -->
    <div class="card" id="calendar-card">
      <div class="card-label">Calendar</div>
      <div id="cal-month-title"></div>
      <div id="calendar-grid"></div>
    </div>

    <!-- Weather -->
    <div class="card" id="weather-card">
      <div class="card-label">Weather</div>
      <div id="weather-icon">⛅</div>
      <div id="weather-text">Coming soon</div>
      <div id="weather-sub">Location &amp; API<br>not yet wired</div>
    </div>

    <!-- Gesture Status -->
    <div class="card" id="gesture-card">
      <div class="card-label">Gesture</div>
      <div id="gesture-name">none</div>
      <div id="gesture-action">show your hand</div>
      <div id="finger-pips">
        <div class="finger-pip-wrap">
          <div class="finger-pip" id="pip-thumb"></div>
          <div class="finger-pip-label">T</div>
        </div>
        <div class="finger-pip-wrap">
          <div class="finger-pip" id="pip-index"></div>
          <div class="finger-pip-label">I</div>
        </div>
        <div class="finger-pip-wrap">
          <div class="finger-pip" id="pip-middle"></div>
          <div class="finger-pip-label">M</div>
        </div>
        <div class="finger-pip-wrap">
          <div class="finger-pip" id="pip-ring"></div>
          <div class="finger-pip-label">R</div>
        </div>
        <div class="finger-pip-wrap">
          <div class="finger-pip" id="pip-pinky"></div>
          <div class="finger-pip-label">P</div>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Photo Carousel ────────────────────────────────────────────────── -->
  <div id="carousel-section">
    <div id="carousel-viewport">
      <div id="carousel-track"></div>
    </div>
    <div id="carousel-controls">
      <button class="carousel-arrow" id="carousel-prev">&#8249;</button>
      <div id="carousel-bar"></div>
      <button class="carousel-arrow" id="carousel-next">&#8250;</button>
    </div>
    <div id="carousel-gesture-hint">✦ &nbsp; Swipe hand left / right to browse</div>
  </div>

  <!-- ── Cursor Overlay ─────────────────────────────────────────────────── -->
  <canvas id="cursor-canvas"></canvas>

  <!-- ── PiP Webcam ─────────────────────────────────────────────────────── -->
  <div id="pip-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="skeleton-canvas" width="300" height="224"></canvas>
    <div id="pip-badge">Hand Tracking</div>
  </div>

  <!-- ── Init HUD ───────────────────────────────────────────────────────── -->
  <div id="init-hud">Initializing camera…</div>

  <!-- ── Calendar Modal ─────────────────────────────────────────────────── -->
  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-date-display"></div>
      <div id="modal-day-name"></div>
      <div id="modal-content">No events scheduled for this date.</div>
      <button id="modal-close">Close</button>
    </div>
  </div>

  <!-- ── MediaPipe CDN ──────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
  // ═══════════════════════════════════════════════════════════════════════════
  // TIMER
  // ═══════════════════════════════════════════════════════════════════════════
  let timerMinutes = 5;
  let timerSeconds = 0;
  let timerRunning = false;
  let timerInterval = null;

  const timerDisplay = document.getElementById('timer-display');
  const timerStatus  = document.getElementById('timer-status');
  const timerDot     = document.getElementById('timer-dot');
  const btnStart     = document.getElementById('btn-start');
  const btnStop      = document.getElementById('btn-stop');

  function pad(n) { return String(n).padStart(2, '0'); }

  function renderTimer() {
    timerDisplay.textContent = `${pad(timerMinutes)}:${pad(timerSeconds)}`;
  }

  function setRunningState(running) {
    timerRunning = running;
    timerDisplay.classList.toggle('running', running);
    timerDot.classList.toggle('running', running);
    btnStart.disabled = running;
    btnStop.disabled  = !running;
  }

  function startStopTimer() {
    if (timerRunning) {
      clearInterval(timerInterval);
      setRunningState(false);
      timerStatus.textContent = 'Paused';
      console.log('[GESTURE] Timer → paused');
    } else {
      setRunningState(true);
      timerStatus.textContent = 'Running';
      console.log('[GESTURE] Timer → started');
      timerInterval = setInterval(() => {
        if (timerSeconds === 0) {
          if (timerMinutes === 0) {
            clearInterval(timerInterval);
            setRunningState(false);
            timerStatus.textContent = 'Done';
            return;
          }
          timerMinutes--;
          timerSeconds = 59;
        } else {
          timerSeconds--;
        }
        renderTimer();
      }, 1000);
    }
  }

  function resetTimer() {
    clearInterval(timerInterval);
    setRunningState(false);
    timerMinutes = 5;
    timerSeconds = 0;
    renderTimer();
    timerStatus.textContent = 'Reset';
    console.log('[GESTURE] Timer → reset to 5:00');
    setTimeout(() => { if (!timerRunning) timerStatus.textContent = 'Ready'; }, 1200);
  }

  function adjustTimer(delta) {
    if (timerRunning) return;
    timerMinutes = Math.max(1, Math.min(99, timerMinutes + delta));
    timerSeconds = 0;
    renderTimer();
    timerStatus.textContent = `${timerMinutes} min`;
    console.log(`[GESTURE] Timer adjusted → ${timerMinutes}:00`);
  }

  btnStart.addEventListener('click', () => { if (!timerRunning) startStopTimer(); });
  btnStop.addEventListener('click',  () => { if  (timerRunning) startStopTimer(); });
  document.getElementById('btn-minus').addEventListener('click', () => adjustTimer(-1));
  document.getElementById('btn-plus').addEventListener('click',  () => adjustTimer(1));
  renderTimer();

  // ═══════════════════════════════════════════════════════════════════════════
  // CALENDAR
  // ═══════════════════════════════════════════════════════════════════════════
  const MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];
  const DAY_NAMES   = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const DAY_FULL    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  const now       = new Date();
  const curYear   = now.getFullYear();
  const curMonth  = now.getMonth();
  const todayDate = now.getDate();

  document.getElementById('cal-month-title').textContent =
    `${MONTH_NAMES[curMonth]} ${curYear}`;

  const grid = document.getElementById('calendar-grid');

  DAY_NAMES.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  const firstWeekday = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth  = new Date(curYear, curMonth + 1, 0).getDate();

  for (let i = 0; i < firstWeekday; i++) {
    const e = document.createElement('div');
    e.className = 'cal-day empty';
    grid.appendChild(e);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const btn = document.createElement('button');
    btn.className = 'cal-day' + (d === todayDate ? ' today' : '');
    btn.textContent = d;
    const weekday = new Date(curYear, curMonth, d).getDay();
    btn.dataset.date    = `${MONTH_NAMES[curMonth]} ${d}, ${curYear}`;
    btn.dataset.dayName = DAY_FULL[weekday];
    btn.addEventListener('click', () => openModal(btn.dataset.date, btn.dataset.dayName));
    grid.appendChild(btn);
  }

  // ── Modal ──────────────────────────────────────────────────────────────────
  const modalOverlay = document.getElementById('modal-overlay');

  function openModal(dateStr, dayName) {
    document.getElementById('modal-date-display').textContent = dateStr;
    document.getElementById('modal-day-name').textContent     = dayName;
    modalOverlay.classList.add('visible');
    console.log(`[GESTURE] Calendar tap → ${dateStr}`);
  }

  function closeModal() {
    modalOverlay.classList.remove('visible');
    console.log('[GESTURE] Modal closed');
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

  // ═══════════════════════════════════════════════════════════════════════════
  // GESTURE CARD
  // ═══════════════════════════════════════════════════════════════════════════
  const gestureNameEl   = document.getElementById('gesture-name');
  const gestureActionEl = document.getElementById('gesture-action');
  const fingerPipEls    = [
    document.getElementById('pip-thumb'),
    document.getElementById('pip-index'),
    document.getElementById('pip-middle'),
    document.getElementById('pip-ring'),
    document.getElementById('pip-pinky'),
  ];

  const GESTURE_ACTIONS = {
    open_hand: 'start / stop timer',
    fist:      'reset timer',
    pointing:  'hover to interact',
    other:     '—',
    none:      'show your hand',
  };

  function updateGestureCard(name, ext) {
    const label = name.replace('_', ' ');
    gestureNameEl.textContent  = label;
    gestureActionEl.textContent = GESTURE_ACTIONS[name] || '—';
    gestureNameEl.classList.toggle('active', name !== 'none' && name !== 'other');
    if (ext) {
      fingerPipEls.forEach((pip, i) => pip.classList.toggle('extended', !!ext[i]));
    } else {
      fingerPipEls.forEach(pip => pip.classList.remove('extended'));
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // CAROUSEL
  // ═══════════════════════════════════════════════════════════════════════════
  const SLIDE_DATA = [
    { label: 'Mountains', icon: '🏔', bg: 'linear-gradient(145deg,#0f0c29 0%,#302b63 60%,#24243e 100%)' },
    { label: 'Ocean',     icon: '🌊', bg: 'linear-gradient(145deg,#0d4b6e 0%,#0a7abf 55%,#1abc9c 100%)' },
    { label: 'Forest',    icon: '🌲', bg: 'linear-gradient(145deg,#1a3a1a 0%,#2d6a2d 55%,#52b788 100%)' },
    { label: 'Desert',    icon: '🏜', bg: 'linear-gradient(145deg,#4a2010 0%,#c45e1e 55%,#e8a44a 100%)' },
    { label: 'City',      icon: '🌆', bg: 'linear-gradient(145deg,#1a0a3d 0%,#4a1580 55%,#8e44ad 100%)' },
    { label: 'Snowscape', icon: '❄',  bg: 'linear-gradient(145deg,#1a2a3a 0%,#2e6b98 55%,#85c1e9 100%)' },
    { label: 'Sunset',    icon: '🌅', bg: 'linear-gradient(145deg,#7b1a2a 0%,#c0392b 45%,#e67e22 100%)' },
  ];

  const carouselTrack  = document.getElementById('carousel-track');
  const carouselBarEl  = document.getElementById('carousel-bar');
  const CAROUSEL_N     = SLIDE_DATA.length;
  let   carouselIdx    = 0;

  const slideEls = SLIDE_DATA.map(s => {
    const el = document.createElement('div');
    el.className = 'carousel-slide';
    el.style.background = s.bg;
    el.innerHTML = `<span class="slide-icon">${s.icon}</span><span class="slide-label">${s.label}</span>`;
    carouselTrack.appendChild(el);
    return el;
  });

  const dotEls = SLIDE_DATA.map((_, i) => {
    const d = document.createElement('div');
    d.className = 'carousel-dot';
    d.addEventListener('click', () => goToSlide(i));
    carouselBarEl.appendChild(d);
    return d;
  });

  function renderCarousel() {
    slideEls.forEach((el, i) => {
      const off = i - carouselIdx;
      let tx, tz, ry, scale, opacity, zi;
      if      (off ===  0) { tx=0;    tz=0;    ry=0;    scale=1;    opacity=1;    zi=5; }
      else if (off === -1) { tx=-58;  tz=-110; ry=38;   scale=0.78; opacity=0.68; zi=4; }
      else if (off ===  1) { tx= 58;  tz=-110; ry=-38;  scale=0.78; opacity=0.68; zi=4; }
      else if (off === -2) { tx=-106; tz=-260; ry=52;   scale=0.55; opacity=0.28; zi=3; }
      else if (off ===  2) { tx= 106; tz=-260; ry=-52;  scale=0.55; opacity=0.28; zi=3; }
      else                 { tx=0;    tz=-480; ry=0;    scale=0.3;  opacity=0;    zi=1; }
      el.style.transform = `translateX(${tx}%) translateZ(${tz}px) rotateY(${ry}deg) scale(${scale})`;
      el.style.opacity   = String(opacity);
      el.style.zIndex    = String(zi);
      el.dataset.center  = off === 0 ? 'true' : 'false';
    });
    dotEls.forEach((d, i) => d.classList.toggle('active', i === carouselIdx));
  }

  function goToSlide(i) {
    carouselIdx = ((i % CAROUSEL_N) + CAROUSEL_N) % CAROUSEL_N;
    renderCarousel();
  }

  function nextSlide() {
    goToSlide(carouselIdx + 1);
    console.log(`[GESTURE] Carousel → next (${carouselIdx})`);
  }

  function prevSlide() {
    goToSlide(carouselIdx - 1);
    console.log(`[GESTURE] Carousel → prev (${carouselIdx})`);
  }

  document.getElementById('carousel-prev').addEventListener('click', prevSlide);
  document.getElementById('carousel-next').addEventListener('click', nextSlide);
  renderCarousel();

  // Swipe tracking
  const SWIPE_WIN    = 14;
  const SWIPE_THRESH = 0.16;
  const SWIPE_COOL   = 900;
  let wristXHist  = [];
  let swipeCoolTs = 0;

  // ═══════════════════════════════════════════════════════════════════════════
  // CURSOR CANVAS
  // ═══════════════════════════════════════════════════════════════════════════
  const cursorCanvas = document.getElementById('cursor-canvas');
  const cursorCtx    = cursorCanvas.getContext('2d');

  function resizeCursor() {
    cursorCanvas.width  = window.innerWidth;
    cursorCanvas.height = window.innerHeight;
  }
  resizeCursor();
  window.addEventListener('resize', resizeCursor);

  function drawCursor(x, y, dwellProgress) {
    cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
    if (x == null) return;

    const R = 15;

    // Soft drop shadow
    cursorCtx.shadowColor = 'rgba(0,0,0,0.5)';
    cursorCtx.shadowBlur  = 10;

    // Outer ring
    cursorCtx.beginPath();
    cursorCtx.arc(x, y, R, 0, Math.PI * 2);
    cursorCtx.strokeStyle = 'rgba(255,255,255,0.88)';
    cursorCtx.lineWidth   = 2;
    cursorCtx.stroke();

    // Center dot
    cursorCtx.beginPath();
    cursorCtx.arc(x, y, 3, 0, Math.PI * 2);
    cursorCtx.fillStyle  = 'rgba(255,255,255,0.95)';
    cursorCtx.shadowBlur = 0;
    cursorCtx.fill();

    // Crosshair spurs
    cursorCtx.shadowBlur  = 0;
    cursorCtx.strokeStyle = 'rgba(255,255,255,0.4)';
    cursorCtx.lineWidth   = 1.5;
    const gap = 3, len = 8;
    [[x-R-len,y, x-R-gap,y], [x+R+gap,y, x+R+len,y],
     [x,y-R-len, x,y-R-gap], [x,y+R+gap, x,y+R+len]].forEach(([x1,y1,x2,y2]) => {
      cursorCtx.beginPath();
      cursorCtx.moveTo(x1, y1);
      cursorCtx.lineTo(x2, y2);
      cursorCtx.stroke();
    });

    // Dwell arc
    if (dwellProgress > 0) {
      cursorCtx.beginPath();
      cursorCtx.arc(x, y, R + 7, -Math.PI/2, -Math.PI/2 + Math.PI*2*dwellProgress);
      cursorCtx.strokeStyle = `rgba(92,255,168,${0.5 + dwellProgress * 0.5})`;
      cursorCtx.lineWidth   = 3;
      cursorCtx.lineCap     = 'round';
      cursorCtx.stroke();
      cursorCtx.lineCap = 'butt';
    }

    cursorCtx.shadowBlur = 0;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SKELETON CANVAS
  // ═══════════════════════════════════════════════════════════════════════════
  const skeletonCanvas = document.getElementById('skeleton-canvas');
  const skeletonCtx    = skeletonCanvas.getContext('2d');

  // ═══════════════════════════════════════════════════════════════════════════
  // GESTURE RECOGNITION
  // ═══════════════════════════════════════════════════════════════════════════
  function euclidean(a, b) {
    return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2 + ((a.z||0)-(b.z||0))**2);
  }

  // Hysteresis thresholds: harder to enter extended, easier to stay extended.
  // Prevents rapid flickering between states on borderline finger positions.
  const EXT_ON  = 1.35;
  const EXT_OFF = 1.18;
  const FINGER_TIPS = [4,  8, 12, 16, 20];
  const FINGER_MCPS = [2,  5,  9, 13, 17];
  let prevExt = [false, false, false, false, false];

  function isFingerExtended(lm, tipIdx, mcpIdx, wasExtended) {
    const wrist = lm[0];
    const ratio = euclidean(lm[tipIdx], wrist) / euclidean(lm[mcpIdx], wrist);
    return wasExtended ? ratio > EXT_OFF : ratio > EXT_ON;
  }

  function detectGesture(lm) {
    const ext = FINGER_TIPS.map((tip, i) =>
      isFingerExtended(lm, tip, FINGER_MCPS[i], prevExt[i])
    );
    prevExt = ext;
    const [thumb, index, middle, ring, pinky] = ext;
    let name;
    if (ext.every(Boolean))        name = 'open_hand';
    else if (ext.every(e => !e))   name = 'fist';
    else if (index && !middle && !ring && !pinky) name = 'pointing';
    else name = 'other';
    return { name, ext };
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // INTERACTION STATE
  // ═══════════════════════════════════════════════════════════════════════════
  const initHud = document.getElementById('init-hud');

  let currentGesture    = 'none';
  let pendingGesture    = 'none';
  let pendingFrameCount = 0;
  const HOLD_FRAMES     = 3;

  // Cursor smoothing — lerp toward raw position each frame
  let smoothX = null, smoothY = null;
  const LERP  = 0.28;

  // Map the inner 70% of the camera frame to the full screen so you
  // don't need to reach the extreme edges of the camera to hit screen corners.
  const CAM_MARGIN = 0.15;
  function mapToScreen(nx, ny) {
    const fx = Math.max(0, Math.min(1, ((1 - nx) - CAM_MARGIN) / (1 - 2 * CAM_MARGIN)));
    const fy = Math.max(0, Math.min(1, (ny           - CAM_MARGIN) / (1 - 2 * CAM_MARGIN)));
    return { x: fx * window.innerWidth, y: fy * window.innerHeight };
  }

  let hoveredEl     = null;
  let dwellTarget   = null;
  let dwellStart    = null;
  let dwellCooldown = 0;
  const DWELL_MS    = 850;
  const COOL_MS     = 1100;

  function getClickTarget(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return null;
    if (el.id === 'btn-plus' || el.id === 'btn-minus') return el;
    if (el.id === 'carousel-prev' || el.id === 'carousel-next') return el;
    if (el.id === 'btn-start' && !btnStart.disabled) return el;
    if (el.id === 'btn-stop'  && !btnStop.disabled)  return el;
    if (el.classList.contains('cal-day') && !el.classList.contains('empty')) return el;
    if (el.id === 'modal-close') return el;
    return null;
  }

  function setHovered(el) {
    if (hoveredEl === el) return;
    if (hoveredEl) hoveredEl.classList.remove('hovered');
    hoveredEl = el;
    if (hoveredEl) hoveredEl.classList.add('hovered');
  }

  function fireDwellClick(el) {
    dwellCooldown = Date.now() + COOL_MS;
    console.log(`[GESTURE] Dwell click → #${el.id || '?'} "${el.textContent.trim()}"`);
    if      (el.id === 'btn-plus')  adjustTimer(1.5);
    else if (el.id === 'btn-minus') adjustTimer(-1.5);
    else if (el.id === 'btn-start' || el.id === 'btn-stop') startStopTimer();
    else    el.click();
  }

  function onGestureChange(from, to, ext) {
    console.log(`[GESTURE] ${from} → ${to}`);
    updateGestureCard(to, ext);
    if (to === 'fist') resetTimer();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // MEDIAPIPE HANDS
  // ═══════════════════════════════════════════════════════════════════════════
  const videoEl = document.getElementById('webcam');

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });

  hands.setOptions({
    maxNumHands:            1,
    modelComplexity:        1,
    minDetectionConfidence: 0.55,
    minTrackingConfidence:  0.40
  });

  hands.onResults(results => {
    skeletonCtx.save();
    skeletonCtx.clearRect(0, 0, 300, 224);
    skeletonCtx.translate(300, 0);
    skeletonCtx.scale(-1, 1);

    if (results.multiHandLandmarks?.length) {
      const lm = results.multiHandLandmarks[0];

      drawConnectors(skeletonCtx, lm, HAND_CONNECTIONS, {
        color: 'rgba(92,255,168,0.7)', lineWidth: 1.5
      });
      drawLandmarks(skeletonCtx, lm, {
        color: 'rgba(255,255,255,0.85)',
        fillColor: 'rgba(92,255,168,0.45)',
        lineWidth: 1,
        radius: 3
      });
      skeletonCtx.restore();

      // ── Swipe detection ────────────────────────────────────────────────
      wristXHist.push(lm[0].x);
      if (wristXHist.length > SWIPE_WIN) wristXHist.shift();
      if (wristXHist.length >= SWIPE_WIN && Date.now() >= swipeCoolTs) {
        const delta = wristXHist[wristXHist.length - 1] - wristXHist[0];
        if (Math.abs(delta) > SWIPE_THRESH) {
          // Mirrored display: increasing x = user moves hand left on screen = forward
          if (delta > 0) nextSlide(); else prevSlide();
          swipeCoolTs  = Date.now() + SWIPE_COOL;
          wristXHist   = [];
        }
      }

      // ── Gesture stabilization ──────────────────────────────────────────
      const { name: raw, ext } = detectGesture(lm);

      // Always update finger pips live
      fingerPipEls.forEach((pip, i) => pip.classList.toggle('extended', !!ext[i]));

      if (raw === pendingGesture) {
        pendingFrameCount++;
      } else {
        pendingGesture    = raw;
        pendingFrameCount = 0;
      }

      if (pendingFrameCount >= HOLD_FRAMES && raw !== currentGesture) {
        const prev = currentGesture;
        currentGesture = raw;
        onGestureChange(prev, currentGesture, ext);
      }

      // ── Cursor + dwell ────────────────────────────────────────────────
      if (currentGesture === 'pointing') {
        const tip = lm[8];
        const raw = mapToScreen(tip.x, tip.y);

        // Lerp toward raw position for smooth cursor movement
        if (smoothX === null) { smoothX = raw.x; smoothY = raw.y; }
        else {
          smoothX += (raw.x - smoothX) * LERP;
          smoothY += (raw.y - smoothY) * LERP;
        }

        const target = getClickTarget(smoothX, smoothY);
        setHovered(target);

        if (target) {
          if (dwellTarget !== target) {
            dwellTarget = target;
            dwellStart  = Date.now();
          }
          const progress = Math.min((Date.now() - dwellStart) / DWELL_MS, 1);
          drawCursor(smoothX, smoothY, progress);
          if (progress >= 1 && Date.now() >= dwellCooldown) {
            fireDwellClick(target);
            dwellTarget = null;
            dwellStart  = null;
          }
        } else {
          dwellTarget = null;
          dwellStart  = null;
          drawCursor(smoothX, smoothY, 0);
        }
      } else {
        smoothX = null;
        smoothY = null;
        setHovered(null);
        dwellTarget = null;
        dwellStart  = null;
        drawCursor(null, null, 0);
      }

    } else {
      skeletonCtx.restore();
      currentGesture    = 'none';
      pendingGesture    = 'none';
      pendingFrameCount = 0;
      prevExt    = [false, false, false, false, false];
      smoothX    = null;
      smoothY    = null;
      wristXHist = [];
      setHovered(null);
      dwellTarget = null;
      drawCursor(null, null, 0);
      updateGestureCard('none', null);
    }
  });

  // ── Start camera ──────────────────────────────────────────────────────────
  let frameLoopRunning = false;

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480, facingMode: 'user' }
      });
      videoEl.srcObject = stream;
      await videoEl.play();

      initHud.textContent = 'Show your hand';
      console.log('[GESTURE] Camera started — MediaPipe Hands active');
      setTimeout(() => initHud.classList.add('hidden'), 2400);

      frameLoopRunning = true;
      async function processFrame() {
        if (!frameLoopRunning) return;
        if (!videoEl.paused && !videoEl.ended && videoEl.readyState >= 2) {
          await hands.send({ image: videoEl });
        }
        requestAnimationFrame(processFrame);
      }
      requestAnimationFrame(processFrame);
    } catch (err) {
      initHud.textContent = `Camera error: ${err.message}`;
      console.error('[GESTURE] Camera error:', err);
    }
  }

  startCamera();
  </script>
</body>
</html>
