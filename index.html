<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesture Dashboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      overflow-y: auto;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 24px 0 32px;
    }

    /* ── Bento Grid ───────────────────────────────────────────────────────── */
    .bento {
      display: grid;
      grid-template-columns: 268px 1fr 188px;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      width: min(960px, calc(100vw - 32px));
      height: min(572px, calc(100vh - 32px));
    }

    .card {
      background: #131313;
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 18px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .card-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: rgba(255,255,255,0.22);
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    /* ── Pomodoro ─────────────────────────────────────────────────────────── */
    #pomodoro-card {
      grid-column: 1;
      grid-row: 1 / 3;
    }

    #timer-display {
      font-size: 84px;
      font-weight: 100;
      color: #efefef;
      font-variant-numeric: tabular-nums;
      letter-spacing: -4px;
      line-height: 1;
      transition: color 0.4s;
    }

    #timer-display.running {
      color: #5cffa8;
    }

    #timer-status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
    }

    #timer-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    #timer-dot.running {
      background: #5cffa8;
      box-shadow: 0 0 8px rgba(92,255,168,0.7);
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    #timer-status {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.38);
    }

    #timer-controls {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .timer-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.55);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
      position: relative;
      z-index: 1;
    }

    .timer-btn.hovered {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.9);
    }

    .timer-btn:active {
      transform: scale(0.91);
      background: rgba(255,255,255,0.04);
    }

    .timer-btn-label {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      text-align: center;
      margin-top: 5px;
      letter-spacing: 0.06em;
    }

    #timer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 18px;
    }

    .timer-action-btn {
      height: 42px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, border-color 0.15s, color 0.15s, opacity 0.15s;
    }

    #btn-start {
      background: rgba(92,255,168,0.12);
      border: 1.5px solid rgba(92,255,168,0.28);
      color: #5cffa8;
    }

    #btn-start:not(:disabled):hover {
      background: rgba(92,255,168,0.2);
      border-color: rgba(92,255,168,0.5);
    }

    #btn-start:disabled {
      opacity: 0.25;
      cursor: default;
    }

    #btn-stop {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.38);
    }

    #btn-stop:not(:disabled):hover {
      background: rgba(255,80,80,0.1);
      border-color: rgba(255,100,100,0.3);
      color: rgba(255,140,140,0.9);
    }

    #btn-stop:disabled {
      opacity: 0.2;
      cursor: default;
    }

    #timer-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .hint-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.22);
    }

    .hint-glyph {
      font-size: 13px;
      line-height: 1;
      width: 18px;
      text-align: center;
    }

    /* ── Calendar ─────────────────────────────────────────────────────────── */
    #calendar-card {
      grid-column: 2;
      grid-row: 1 / 3;
      padding: 26px 28px;
    }

    #cal-month-title {
      font-size: 22px;
      font-weight: 600;
      color: #efefef;
      letter-spacing: -0.3px;
    }

    #calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      flex: 1;
      margin-top: 4px;
    }

    .cal-header {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.22);
      text-align: center;
      padding: 5px 0 8px;
      letter-spacing: 0.06em;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      border-radius: 9px;
      cursor: pointer;
      background: transparent;
      border: none;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
    }

    .cal-day.hovered {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
    }

    .cal-day:active {
      background: rgba(255,255,255,0.12);
    }

    .cal-day.today {
      background: rgba(92,255,168,0.12);
      color: #5cffa8;
      font-weight: 700;
    }

    .cal-day.today.hovered {
      background: rgba(92,255,168,0.2);
    }

    .cal-day.empty {
      pointer-events: none;
    }

    /* ── Weather ──────────────────────────────────────────────────────────── */
    #weather-card {
      grid-column: 3;
      grid-row: 1;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 0;
      padding: 20px;
    }

    #weather-card .card-label {
      position: absolute;
      top: 20px;
      left: 20px;
      margin-bottom: 0;
    }

    #weather-icon {
      font-size: 44px;
      line-height: 1;
      margin-bottom: 10px;
      filter: saturate(0.4) opacity(0.65);
    }

    #weather-text {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      margin-bottom: 4px;
    }

    #weather-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      line-height: 1.6;
    }

    /* ── Gesture Card ─────────────────────────────────────────────────────── */
    #gesture-card {
      grid-column: 3;
      grid-row: 2;
      padding: 20px;
      gap: 0;
    }

    #gesture-name {
      font-size: 17px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      letter-spacing: -0.2px;
      margin-top: 2px;
      text-transform: capitalize;
      transition: color 0.25s;
      line-height: 1.2;
    }

    #gesture-name.active {
      color: #5cffa8;
    }

    #gesture-action {
      font-size: 10px;
      color: rgba(255,255,255,0.22);
      margin-top: 5px;
      line-height: 1.4;
    }

    #finger-pips {
      display: flex;
      gap: 7px;
      margin-top: auto;
      align-items: flex-end;
    }

    .finger-pip-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .finger-pip {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.14);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .finger-pip.extended {
      background: #5cffa8;
      border-color: #5cffa8;
      box-shadow: 0 0 6px rgba(92,255,168,0.55);
    }

    .finger-pip-label {
      font-size: 8px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    /* ── PiP Webcam ───────────────────────────────────────────────────────── */
    #pip-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 300px;
      height: 224px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 12px 48px rgba(0,0,0,0.6);
      z-index: 100;
      background: #080808;
    }

    #webcam {
      width: 300px;
      height: 224px;
      object-fit: cover;
      transform: scaleX(-1);
      display: block;
      opacity: 0.92;
    }

    #skeleton-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 224px;
    }

    #pip-badge {
      position: absolute;
      bottom: 9px;
      left: 11px;
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Cursor Overlay ───────────────────────────────────────────────────── */
    #cursor-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 600;
    }

    /* ── Init HUD (camera status only) ───────────────────────────────────── */
    #init-hud {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(13,13,13,0.85);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      z-index: 300;
      backdrop-filter: blur(14px);
      letter-spacing: 0.03em;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #init-hud.hidden {
      opacity: 0;
    }

    /* ── Calendar Modal ───────────────────────────────────────────────────── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    #modal-overlay.visible {
      display: flex;
    }

    #modal {
      background: #191919;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 36px;
      min-width: 300px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    }

    #modal-date-display {
      font-size: 30px;
      font-weight: 300;
      color: #efefef;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    #modal-day-name {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      font-weight: 500;
      margin-bottom: 24px;
    }

    #modal-content {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      line-height: 1.7;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 22px;
    }

    #modal-close {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 11px 22px;
      cursor: pointer;
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      transition: background 0.12s, color 0.12s;
      letter-spacing: 0.02em;
    }

    #modal-close.hovered,
    #modal-close:hover {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.9);
    }

    /* ── Carousel ─────────────────────────────────────────────────────────── */
    #carousel-section {
      width: min(960px, calc(100vw - 32px));
      flex-shrink: 0;
    }

    #carousel-viewport {
      position: relative;
      height: 190px;
      perspective: 900px;
      overflow: hidden;
    }

    #carousel-track {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .carousel-slide {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 360px;
      height: 160px;
      margin-top: -80px;
      margin-left: -180px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.09);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.48s cubic-bezier(0.4,0,0.2,1),
                  opacity  0.48s cubic-bezier(0.4,0,0.2,1);
      will-change: transform, opacity;
    }

    .carousel-slide[data-center="true"] {
      box-shadow: 0 16px 56px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.12);
    }

    .slide-icon {
      font-size: 38px;
      line-height: 1;
      filter: saturate(0.55) opacity(0.8);
    }

    .slide-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    #carousel-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-top: 14px;
    }

    .carousel-arrow {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.11);
      color: rgba(255,255,255,0.45);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      line-height: 1;
      transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.1s;
    }

    .carousel-arrow:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.88);
    }

    .carousel-arrow:active { transform: scale(0.91); }

    .carousel-arrow.hovered {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.88);
    }

    #carousel-bar {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .carousel-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.16);
      cursor: pointer;
      transition: background 0.25s, transform 0.25s;
    }

    .carousel-dot.active {
      background: #5cffa8;
      transform: scale(1.45);
    }

    #carousel-gesture-hint {
      text-align: center;
      margin-top: 9px;
      font-size: 10px;
      color: rgba(255,255,255,0.16);
      letter-spacing: 0.07em;
    }
  </style>
</head>
<body>

  <!-- ── Bento Grid ─────────────────────────────────────────────────────── -->
  <div class="bento">

    <!-- Pomodoro -->
    <div class="card" id="pomodoro-card">
      <div class="card-label">Pomodoro</div>
      <div id="timer-display">05:00</div>
      <div id="timer-status-row">
        <div id="timer-dot"></div>
        <div id="timer-status">Ready</div>
      </div>
      <div id="timer-actions">
        <button class="timer-action-btn" id="btn-start">Start</button>
        <button class="timer-action-btn" id="btn-stop" disabled>Stop</button>
      </div>
      <div id="timer-controls">
        <div>
          <button class="timer-btn" id="btn-minus">−</button>
          <div class="timer-btn-label">–1 min</div>
        </div>
        <div>
          <button class="timer-btn" id="btn-plus">+</button>
          <div class="timer-btn-label">+1 min</div>
        </div>
      </div>
      <div id="timer-footer">
        <div class="hint-row">
          <span class="hint-glyph">✊</span>
          <span>Fist — reset</span>
        </div>
        <div class="hint-row">
          <span class="hint-glyph">☝️</span>
          <span>Point + dwell — ±1.5 min</span>
        </div>
      </div>
    </div>

    <!-- Calendar -->
    <div class="card" id="calendar-card">
      <div class="card-label">Calendar</div>
      <div id="cal-month-title"></div>
      <div id="calendar-grid"></div>
    </div>

    <!-- Weather -->
    <div class="card" id="weather-card">
      <div class="card-label">Weather</div>
      <div id="weather-icon">⛅</div>
      <div id="weather-text">Coming soon</div>
      <div id="weather-sub">Location &amp; API<br>not yet wired</div>
    </div>

    <!-- Gesture Status -->
    <div class="card" id="gesture-card">
      <div class="card-label">Gesture</div>
      <div id="gesture-name">none</div>
      <div id="gesture-action">show your hand</div>
      <div id="finger-pips">
        <div class="finger-pip-wrap">
          <div class="finger-pip" id="pip-thumb"></div>
          <div class="finger-pip-label">T</div>
        </div>
        <div class="finger-pip-wrap">
          <div class="finger-pip" id="pip-index"></div>
          <div class="finger-pip-label">I</div>
        </div>
        <div class="finger-pip-wrap">
          <div class="finger-pip" id="pip-middle"></div>
          <div class="finger-pip-label">M</div>
        </div>
        <div class="finger-pip-wrap">
          <div class="finger-pip" id="pip-ring"></div>
          <div class="finger-pip-label">R</div>
        </div>
        <div class="finger-pip-wrap">
          <div class="finger-pip" id="pip-pinky"></div>
          <div class="finger-pip-label">P</div>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Photo Carousel ────────────────────────────────────────────────── -->
  <div id="carousel-section">
    <div id="carousel-viewport">
      <div id="carousel-track"></div>
    </div>
    <div id="carousel-controls">
      <button class="carousel-arrow" id="carousel-prev">&#8249;</button>
      <div id="carousel-bar"></div>
      <button class="carousel-arrow" id="carousel-next">&#8250;</button>
    </div>
    <div id="carousel-gesture-hint">✦ &nbsp; Swipe hand left / right to browse</div>
  </div>

  <!-- ── Cursor Overlay ─────────────────────────────────────────────────── -->
  <canvas id="cursor-canvas"></canvas>

  <!-- ── PiP Webcam ─────────────────────────────────────────────────────── -->
  <div id="pip-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="skeleton-canvas" width="300" height="224"></canvas>
    <div id="pip-badge">Hand Tracking</div>
  </div>

  <!-- ── Init HUD ───────────────────────────────────────────────────────── -->
  <div id="init-hud">Initializing camera…</div>

  <!-- ── Calendar Modal ─────────────────────────────────────────────────── -->
  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-date-display"></div>
      <div id="modal-day-name"></div>
      <div id="modal-content">No events scheduled for this date.</div>
      <button id="modal-close">Close</button>
    </div>
  </div>

  <!-- ── MediaPipe CDN ──────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script>
  // Camera initialization
  const webcam = document.getElementById('webcam');
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      webcam.srcObject = stream;
    })
    .catch(err => {
      document.getElementById('init-hud').textContent = 'Camera access denied';
      console.error('Camera error:', err);
    });
  // ...existing code...
  </script>
</body>
</html>
